name: stocktracker

services:
  stocktracker:
    image: ${DOCKER_IMAGE:-ghcr.io/byte92/stocktracker:latest}
    pull_policy: missing
    # 如需本地构建，取消下面 build 配置的注释即可。
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: stocktracker
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    ports:
      - "${HOST_PORT:-3218}:3218"
    env_file:
      - path: ../.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3218
      FINANCE_SQLITE_PATH: /app/data/finance.sqlite
    volumes:
      - ./data:/app/data
