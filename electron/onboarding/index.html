<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockTracker 初始设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      user-select: none;
    }

    .container {
      width: 520px;
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      -webkit-app-region: no-drag;
    }

    .step { display: none; }
    .step.active { display: block; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover { background: #2563eb; }

    .btn-secondary {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    .btn-secondary:hover {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-skip {
      background: transparent;
      color: #64748b;
      border: none;
      font-size: 13px;
      text-decoration: underline;
      cursor: pointer;
      padding: 8px;
    }

    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      transition: background 0.3s;
    }

    .progress-dot.active { background: #3b82f6; }
    .progress-dot.done { background: #22c55e; }

    .success-icon {
      font-size: 64px;
      text-align: center;
      margin-bottom: 16px;
    }

    .field-group { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Step 0: Welcome -->
    <div class="step active" id="step-0">
      <div class="logo">📊</div>
      <h1>欢迎使用 StockTracker</h1>
      <p class="subtitle">
        本地优先的个人投资记录与 AI 投研工作台。<br>
        数据保存在本机，不需要账号，不上传云端。
      </p>
      <p class="subtitle" style="color: #64748b; font-size: 13px;">
        接下来我们会帮你配置 AI 服务，这一步可以跳过。<br>
        跳过后你仍然可以使用行情和交易记录功能。
      </p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="goToStep(1)">开始设置</button>
      </div>
      <div style="text-align: center; margin-top: 12px;">
        <button class="btn-skip" onclick="finish()">跳过，直接进入</button>
      </div>
    </div>

    <!-- Step 1: AI Provider -->
    <div class="step" id="step-1">
      <div class="progress">
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
      </div>
      <h1>AI 服务配置</h1>
      <p class="subtitle">选择你的 AI 服务商，填入连接信息。</p>

      <div class="field-group">
        <label for="provider">服务商类型</label>
        <select id="provider" onchange="onProviderChange()">
          <option value="openai-compatible">OpenAI Compatible</option>
          <option value="anthropic-compatible">Anthropic Compatible</option>
        </select>
      </div>

      <div class="field-group">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
        <p class="hint" id="baseUrlHint">OpenAI API 地址，或第三方兼容服务的地址</p>
      </div>

      <div class="field-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>

      <div class="field-group">
        <label for="model">模型名称</label>
        <input type="text" id="model" placeholder="gpt-4o-mini">
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="goToStep(0)">返回</button>
        <button class="btn btn-primary" onclick="goToStep(2)">下一步</button>
      </div>
      <div style="text-align: center; margin-top: 12px;">
        <button class="btn-skip" onclick="finish()">跳过 AI 配置</button>
      </div>
    </div>

    <!-- Step 2: Done -->
    <div class="step" id="step-2">
      <div class="progress">
        <div class="progress-dot done"></div>
        <div class="progress-dot done"></div>
      </div>
      <div class="success-icon">✅</div>
      <h1>设置完成</h1>
      <p class="subtitle">
        配置已保存。StockTracker 正在启动，稍等片刻即可使用。
      </p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="finish()" style="flex: 1;">进入 StockTracker</button>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 0;

    function goToStep(n) {
      document.getElementById('step-' + currentStep).classList.remove('active');
      document.getElementById('step-' + n).classList.add('active');
      currentStep = n;
    }

    function onProviderChange() {
      const provider = document.getElementById('provider').value;
      const hint = document.getElementById('baseUrlHint');
      const baseUrl = document.getElementById('baseUrl');

      if (provider === 'anthropic-compatible') {
        hint.textContent = 'Anthropic API 地址，或第三方兼容服务的地址';
        baseUrl.placeholder = 'https://api.anthropic.com';
      } else {
        hint.textContent = 'OpenAI API 地址，或第三方兼容服务的地址';
        baseUrl.placeholder = 'https://api.openai.com/v1';
      }
    }

    async function finish() {
      const provider = document.getElementById('provider')?.value || '';
      const baseUrl = document.getElementById('baseUrl')?.value?.trim() || '';
      const apiKey = document.getElementById('apiKey')?.value?.trim() || '';
      const model = document.getElementById('model')?.value?.trim() || '';

      if (provider && apiKey) {
        try {
          await window.electronAPI.saveConfig({ provider, baseUrl, apiKey, model });
        } catch (e) {
          console.error('Failed to save config:', e);
        }
      }

      try {
        await window.electronAPI.finishOnboarding();
      } catch (e) {
        console.error('Failed to finish onboarding:', e);
      }
    }
  </script>
</body>
</html>
